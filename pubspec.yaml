name: instock
description: "InStock — grocery shopping list and pantry manager with recipe support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_local_notifications: ^17.2.0
  dio: ^5.4.3
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.5.3
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  html: ^0.15.4
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  image_path: "assets/brand/icon.png"
  ios: true
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: "#1B1D22"
  adaptive_icon_foreground: "assets/brand/icon.png"
  platforms:
    - android
    - ios
  min_sdk_android: 21

flutter_native_splash:
  color: "#111214"
  image: assets/brand/splash.png
  android: true
  ios: true
  android_12:
    color: "#111214"
    image: assets/brand/splash.png
    icon_background_color: "#111214"
  android_gravity: center
  ios_content_mode: center
  fullscreen: false
  web: false
